services:
  admin:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./admin-frontend/src:/app/src          # hot reload
      - ./admin-frontend/index.html:/app/index.html
    environment:
      - VITE_API_BASE_URL=http://localhost:8000

  web:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - ./web-frontend/src:/app/src            # hot reload
      - ./web-frontend/index.html:/app/index.html
    environment:
      - VITE_API_BASE_URL=http://localhost:8000